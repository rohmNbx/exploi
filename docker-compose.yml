version: '3.8'

services:
  scraper-bot:
    build: .
    container_name: super-scraper-bot
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - TIMEOUT=10
      - MAX_RETRIES=3
      - CACHE_ENABLED=True
      - CACHE_TTL=3600
      - LOG_LEVEL=INFO
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
